server.port=8083

# Azure App Service configuration
server.forward-headers-strategy=framework

# Logging configuration for debugging
logging.level.com.example.jwt_demo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# JWT
jwt.secret=${JWT_SECRET}
jwt.access.expiration.ms=900000
jwt.refresh.expiration.ms=604800000

# MongoDB
spring.data.mongodb.uri=mongodb://root:secret@${MONGO_HOST:localhost}:27017/jwt_demo?authSource=admin

# AI Model Service (Friend's model URL)
ai.model.url=https://my-assistant-flask.azurewebsites.net

#Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB


azure.communication.connection.string=${AZURE_EMAIL_CONNECTION_STRING}
azure.communication.from.email=${AZURE_SENDER_ADDRESS}

# Azure Blob Storage
azure.storage.connection.string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.profile.container=${AZURE_STORAGE_PROFILE_CONTAINER:profile-images}
azure.storage.public.container=${AZURE_STORAGE_PUBLIC_CONTAINER:public-images}
