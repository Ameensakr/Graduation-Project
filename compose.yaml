services:
  app:
    build: .
    ports:
      - '8083:8083'
    environment:
      - 'MONGO_HOST=mongodb'
    depends_on:
      - mongodb
  mongodb:
    image: 'mongo:latest'
    environment:
      - 'MONGO_INITDB_DATABASE=mydatabase'
      - 'MONGO_INITDB_ROOT_PASSWORD=secret'
      - 'MONGO_INITDB_ROOT_USERNAME=root'
    ports:
      - '27017:27017'
